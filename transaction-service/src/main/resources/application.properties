spring.application.name=transaction-service
server.port=8082

spring.datasource.url=jdbc:postgresql://localhost:5433/securebank?currentSchema=transaction_service
spring.datasource.username=securebank
spring.datasource.password=securebank123
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=transaction_service

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=transaction_service
spring.flyway.create-schemas=true

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

management.endpoints.web.exposure.include=health,info