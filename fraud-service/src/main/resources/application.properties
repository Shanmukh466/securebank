spring.application.name=fraud-service
server.port=8083

spring.datasource.url=jdbc:postgresql://localhost:5433/securebank
spring.datasource.username=securebank
spring.datasource.password=securebank123
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=fraud_service

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=fraud_service
spring.flyway.create-schemas=true

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=fraud-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

management.endpoints.web.exposure.include=health,info